name: Stale Issues and PRs

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed in 7 days if no further
            activity occurs. Thank you for your contributions.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had recent activity. It will be closed in 7 days if no
            further activity occurs. Thank you for your contributions.
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
            Feel free to reopen if this is still relevant.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
            Feel free to reopen if this is still relevant.
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,important,bug,security"
          exempt-pr-labels: "pinned,important,security"
          exempt-all-milestones: true
          operations-per-run: 100
