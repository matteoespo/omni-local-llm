name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Welcome to **Omni-LLM**, @${{ github.actor }}! Thanks for opening your first issue.

            A maintainer will review this soon. In the meantime:
            - Make sure you've filled out all the required fields in the issue template
            - Check the [README](https://github.com/matteoespo/lazy-llm#readme) for common setup steps
            - Browse [existing issues](https://github.com/matteoespo/lazy-llm/issues) for related discussions

            We appreciate your contribution! 🙏
          pr-message: |
            👋 Welcome to **Omni-LLM**, @${{ github.actor }}! Thanks for opening your first pull request.

            A maintainer will review your changes shortly. Please make sure:
            - [ ] Tests pass locally (`pytest`)
            - [ ] Code follows the project's style
            - [ ] You've read the [Contributing Guide](https://github.com/matteoespo/lazy-llm/blob/main/CONTRIBUTING.md)

            Thanks for helping improve Omni-LLM! 🚀
